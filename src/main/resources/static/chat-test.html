<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>타로 채팅 테스트 - 앨리스 마스터 전용</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #chat-box { border: 1px solid #e1e1e1; height: 350px; overflow-y: scroll; padding: 15px; background: #fff; border-radius: 8px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .input-group { display: flex; gap: 8px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        #message { flex: 1; }
        button { padding: 12px 20px; background: #6c5ce7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #5b4cc4; }
        .log { color: #6c5ce7; font-size: 13px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px dashed #6c5ce7; padding-bottom: 5px; }
        .chat-item { margin: 0; padding: 2px 0; }
        .system-msg { color: #888; font-size: 12px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔮 타로 상담실 테스트 (Room: 1)</h2>
    <div id="chat-box"></div>
    <div class="input-group">
        <input type="text" id="sender" placeholder="닉네임" value="앨리스" style="width: 100px;">
        <input type="text" id="message" placeholder="상담 메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    let stompClient = null;
    const roomId = "1";

    function connect() {
        const socket = new SockJS('http://localhost:8080/ws-tarot');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('✅ 연결 성공:', frame);
            addLog("서버에 연결되었습니다. 이전 대화를 불러옵니다...");

            // 1. [핵심] 과거 대화 내역 API 호출
            fetchChatHistory(roomId);

            // 2. 실시간 메시지 구독 (Redis 기반)
            stompClient.subscribe('/sub/chat/room/' + roomId, function (response) {
                renderMessage(JSON.parse(response.body));
            });

            // 3. 입장 알림 전송 (필요 시)
            stompClient.send("/pub/chat/message", {}, JSON.stringify({
                'roomId': roomId, 'sender': document.getElementById('sender').value, 'type': 'ENTER'
            }));

        }, function (error) {
            console.error('❌ 연결 실패:', error);
            addLog("연결 실패! 서버 상태를 확인하세요.");
        });
    }

    // DB에서 이전 대화 내역을 가져오는 함수
    function fetchChatHistory(roomId) {
        console.log(">>>> [진행] 이전 대화 내역 서버에 요청 중...");

        // 주소 앞에 http://localhost:8080 을 꼭 붙여주세요!
        fetch(`http://localhost:8080/api/chat/room/${roomId}`)
            .then(res => {
                if (!res.ok) throw new Error("응답 에러: " + res.status);
                return res.json();
            })
            .then(data => {
                console.log(">>>> [성공] 가져온 데이터:", data);
                data.forEach(msg => renderMessage(msg));
                addLog("이전 대화 복구 완료");
            })
            .catch(err => {
                console.error("!!!! [실패] 이유:", err);
                addLog(`이전 기록 로드 실패 (원인: ${err.message})`);
            });
    }

    // 화면에 메시지를 그려주는 통합 함수
    function renderMessage(content) {
        const chatBox = document.getElementById('chat-box');
        const p = document.createElement('p');
        p.className = 'chat-item';

        if (content.type === 'ENTER') {
            p.innerHTML = `<span class="system-msg">[알림] ${content.message || content.sender + '님이 입장하셨습니다.'}</span>`;
        } else {
            p.innerHTML = `<strong>${content.sender}:</strong> ${content.message}`;
        }

        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const sender = document.getElementById('sender').value;
        const message = document.getElementById('message').value;

        if(!stompClient || !stompClient.connected || !message.trim()) return;

        stompClient.send("/pub/chat/message", {}, JSON.stringify({
            'roomId': roomId, 'sender': sender, 'message': message, 'type': 'TALK'
        }));
        document.getElementById('message').value = '';
    }

    function addLog(msg) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="log">[시스템] ${msg}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 자동 실행
    connect();
</script>

</body>
</html>
