<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> <title>타로 채팅 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; background: #f9f9f9; }
        .log { color: blue; font-size: 12px; }
    </style>
</head>
<body>
<h2>🔮 타로 채팅 테스트</h2>
<div>
    <input type="text" id="sender" placeholder="닉네임" value="나그네">
    <input type="text" id="message" placeholder="메시지 입력">
    <button onclick="sendMessage()">전송</button>
</div>
<div id="chat-box"></div>

<script>
    let stompClient = null;
    const roomId = "1";

    function connect() {
        const socket = new SockJS('/ws-tarot'); // 서버 설정과 일치해야 함
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log('✅ 연결 성공:', frame);
            addLog("서버에 연결되었습니다.");

            stompClient.subscribe('/sub/chat/room/' + roomId, function (response) {
                const content = JSON.parse(response.body);
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML += `<p><strong>${content.sender}:</strong> ${content.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }, function (error) {
            console.error('❌ 연결 실패:', error);
            addLog("연결 실패: " + error);
        });
    }

    function sendMessage() {
        const sender = document.getElementById('sender').value;
        const message = document.getElementById('message').value;

        if(!stompClient || !stompClient.connected) {
            alert("서버와 연결되어 있지 않습니다.");
            return;
        }

        stompClient.send("/pub/chat/message", {}, JSON.stringify({
            'roomId': roomId,
            'sender': sender,
            'message': message,
            'type': 'TALK'
        }));
        document.getElementById('message').value = '';
    }

    function addLog(msg) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<p class="log">[시스템] ${msg}</p>`;
    }

    connect(); // 페이지 로드 시 자동 연결
</script>
</body>
</html>
